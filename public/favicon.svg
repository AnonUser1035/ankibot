  <circle cx="19" cy="22" r="3.2" fill="#7e14ff"/>
  <circle cx="29" cy="22" r="3.2" fill="#7e14ff"/>
  <circle cx="20" cy="21" r="1" fill="#ede6ff"/>
  <circle cx="30" cy="21" r="1" fill="#ede6ff"/>
  <!-- mouth -->
  <rect x="18" y="28" width="12" height="2.6" rx="1.3" fill="#47bfff"/>
