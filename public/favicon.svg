  <line x1="24" y1="6" x2="24" y2="12" stroke="#ede6ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="6" r="2.6" fill="#47bfff"/>
  <!-- head -->
  <rect x="11" y="12" width="26" height="22" rx="6" fill="#ede6ff"/>
